<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Turboforge banner</title>
  <desc id="desc">A banner for the Turboforge README with an industrial blueprint-inspired layout, showing layered monorepo systems and the title Turboforge.</desc>
  <defs>
    <linearGradient id="bg" x1="80" y1="48" x2="1204" y2="592" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220"/>
      <stop offset="0.52" stop-color="#111827"/>
      <stop offset="1" stop-color="#1F2937"/>
    </linearGradient>
    <linearGradient id="panel" x1="142" y1="118" x2="1110" y2="504" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A" stop-opacity="0.88"/>
      <stop offset="1" stop-color="#111827" stop-opacity="0.62"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="#334155" stroke-width="1"/>
    </pattern>
  </defs>

  <rect x="0" y="0" width="1280" height="640" rx="28" fill="url(#bg)"/>
  <rect x="0" y="0" width="1280" height="640" rx="28" fill="url(#grid)" opacity="0.24"/>
  <rect x="48" y="48" width="1184" height="544" rx="24" stroke="#334155" stroke-width="1.5"/>
  <rect x="80" y="80" width="1120" height="480" rx="28" fill="url(#panel)" stroke="#475569" stroke-width="1.5"/>

  <circle cx="116" cy="116" r="6" fill="#22D3EE"/>
  <circle cx="140" cy="116" r="6" fill="#60A5FA"/>
  <circle cx="164" cy="116" r="6" fill="#94A3B8"/>

  <g opacity="0.9">
    <path d="M868 196H1094" stroke="#334155" stroke-width="2"/>
    <path d="M868 320H1094" stroke="#334155" stroke-width="2"/>
    <path d="M868 444H1094" stroke="#334155" stroke-width="2"/>
    <path d="M914 196V444" stroke="#334155" stroke-width="2"/>
    <path d="M1008 196V444" stroke="#334155" stroke-width="2"/>
    <rect x="852" y="172" width="258" height="296" rx="20" fill="#0B1220" stroke="#475569" stroke-width="1.5"/>
    <rect x="884" y="218" width="156" height="48" rx="12" fill="#111827" stroke="#3B82F6" stroke-width="1.5"/>
    <rect x="884" y="296" width="194" height="48" rx="12" fill="#111827" stroke="#22D3EE" stroke-width="1.5"/>
    <rect x="884" y="374" width="138" height="48" rx="12" fill="#111827" stroke="#60A5FA" stroke-width="1.5"/>
    <text x="906" y="249" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="19" font-weight="600">sync</text>
    <text x="906" y="327" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="19" font-weight="600">cli-kit</text>
    <text x="906" y="405" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="19" font-weight="600">docs</text>
  </g>

  <g opacity="0.92">
    <path d="M176 468H752" stroke="#334155" stroke-width="2"/>
    <path d="M176 388H752" stroke="#334155" stroke-width="2"/>
    <path d="M176 308H752" stroke="#334155" stroke-width="2"/>
    <path d="M176 228H752" stroke="#334155" stroke-width="2"/>
    <rect x="160" y="206" width="608" height="286" rx="22" fill="#0B1220" stroke="#475569" stroke-width="1.5"/>

    <path d="M230 436C282 412 316 376 370 352C425 327 486 322 548 298C600 278 651 239 690 210" stroke="url(#beam)" stroke-width="10" stroke-linecap="round" opacity="0.9"/>
    <path d="M230 436C282 412 316 376 370 352C425 327 486 322 548 298C600 278 651 239 690 210" stroke="#93C5FD" stroke-width="3" stroke-linecap="round" opacity="0.85" filter="url(#glow)"/>

    <circle cx="230" cy="436" r="12" fill="#0F172A" stroke="#60A5FA" stroke-width="4"/>
    <circle cx="370" cy="352" r="12" fill="#0F172A" stroke="#22D3EE" stroke-width="4"/>
    <circle cx="548" cy="298" r="12" fill="#0F172A" stroke="#60A5FA" stroke-width="4"/>
    <circle cx="690" cy="210" r="12" fill="#0F172A" stroke="#22D3EE" stroke-width="4"/>

    <rect x="204" y="170" width="154" height="34" rx="17" fill="#111827" stroke="#334155"/>
    <text x="227" y="192" fill="#93C5FD" font-family="Consolas, Menlo, monospace" font-size="15" font-weight="700">template drift</text>

    <rect x="392" y="170" width="162" height="34" rx="17" fill="#111827" stroke="#334155"/>
    <text x="415" y="192" fill="#A5F3FC" font-family="Consolas, Menlo, monospace" font-size="15" font-weight="700">repo cohesion</text>

    <rect x="588" y="170" width="148" height="34" rx="17" fill="#111827" stroke="#334155"/>
    <text x="610" y="192" fill="#BFDBFE" font-family="Consolas, Menlo, monospace" font-size="15" font-weight="700">day-two ops</text>
  </g>

  <g>
    <text x="162" y="154" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="92" font-weight="800" letter-spacing="-2">Turboforge</text>
    <text x="166" y="548" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="500">The opinionated layer that keeps a monorepo aligned after the scaffold.</text>
  </g>

  <g opacity="0.55">
    <path d="M802 142L1162 142" stroke="#475569" stroke-width="1.5" stroke-dasharray="8 10"/>
    <path d="M802 506L1162 506" stroke="#475569" stroke-width="1.5" stroke-dasharray="8 10"/>
    <path d="M802 142L802 506" stroke="#475569" stroke-width="1.5" stroke-dasharray="8 10"/>
    <path d="M1162 142L1162 506" stroke="#475569" stroke-width="1.5" stroke-dasharray="8 10"/>
  </g>
</svg>
