name: Release
on:
  push:
    branches:
      - main
      - "v[0-9]*.x" # Matches v1.x, v2.x, etc.
      - "v[0-9]*.[0-9]*.x" # Matches v1.2.x if you need granular LTS

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write # Needed for NPM provenance

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
      
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          pnpm turbo telemetry disable
          pnpm typecheck
          cd apps/web && pnpm next telemetry disable && cd ../..

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm release
          commit: "chore: update versions"
          title: "chore: update versions"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      # New: Create GitHub Releases for each published package
      - name: Create GitHub Releases
        if: steps.changesets.outputs.published == 'true'
        run: pnpm release:github
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Aliases
        if: steps.changesets.outputs.published == 'true'
        run: pnpm node --experimental-strip-types tooling/scripts/publish-aliases.ts --published-packages '${{ steps.changesets.outputs.publishedPackages }}'
        env:
          NPM_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}

      - name: Generate API docs
        if: steps.changesets.outputs.published == 'true'
        run: |
          git config --global user.name "mayank1513"
          git config --global user.email "${{ secrets.EMAIL_ADDRESS || 'info@mayankchaudhari.com' }}"
          git fetch
          git checkout $GITHUB_REF_NAME
          git checkout -- .
          git clean -fd
          pnpm docs
          git add apps/web/content/docs
          if ! git diff --staged --quiet; then
            git commit -m "docs: updated documentation [skip ci]"
            git pull --rebase origin $GITHUB_REF_NAME
            git push origin $GITHUB_REF_NAME
          else
            echo "No documentation changes to commit"
          fi
